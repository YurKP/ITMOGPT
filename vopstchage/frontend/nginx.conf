server {
    listen 80;
    server_name localhost;

    # 1. Раздача React приложения
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Важно для SPA (Single Page Application):
        # Если файл не найден, отдаем index.html, чтобы React Router сам разобрался
        try_files $uri $uri/ /index.html;
    }

    # 2. Проксирование WebSocket и API запросов на Backend
    location /socket.io/ {
        # 'backend' — это имя сервиса из docker-compose.yml
        proxy_pass http://backend:8000;

        # Магия для работы WebSockets:
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Передача IP адреса клиента (важно для безопасности и логов)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }
}
