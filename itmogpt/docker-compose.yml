version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./data:/opt/itmogpt/data
      - chroma_data:/opt/itmogpt/chroma_db
    restart: unless-stopped
    networks:
      - itmogpt

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file:
      - .env
    volumes:
      - ./data:/opt/itmogpt/data
      - chroma_data:/opt/itmogpt/chroma_db
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - itmogpt

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from ${DOMAIN:-localhost} --to http://web:8080
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - itmogpt

volumes:
  chroma_data:
  caddy_data:
  caddy_config:

networks:
  itmogpt:
    driver: bridge
